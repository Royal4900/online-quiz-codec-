<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Quiz Management</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <span class="logo">QUIZ ADMIN</span>
        <a href="/">← Back to Quizzes</a>
    </header>

    <main class="container">
        <div id="login-section">
            <h1>Admin Login</h1>
            <p class="quiz-meta" style="margin-bottom: 1rem;">Default: admin / admin123</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="admin-user" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="admin-pass" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <span id="login-error" class="error-msg"></span>
            </form>
        </div>

        <div id="admin-panel" class="hidden">
            <h1>Quiz Management</h1>
            <button id="new-quiz-btn" class="btn btn-primary" style="margin: 1rem 0;">+ New Quiz</button>
            <div id="admin-quiz-list"></div>
        </div>
    </main>

    <div id="quiz-modal" class="modal-overlay hidden">
        <div class="modal">
            <h3 id="modal-title">New Quiz</h3>
            <form id="quiz-form">
                <input type="hidden" id="edit-quiz-id">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="quiz-title" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="quiz-desc" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="quiz-duration" min="1" required>
                </div>
                <div class="form-group">
                    <label><input type="checkbox" id="quiz-active" checked> Active</label>
                </div>
                <button type="submit" class="btn btn-primary">Save Quiz</button>
                <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
            </form>
        </div>
    </div>

    <div id="question-modal" class="modal-overlay hidden">
        <div class="modal" style="max-width: 600px;">
            <h3>Add Question</h3>
            <form id="question-form">
                <input type="hidden" id="edit-question-quiz-id">
                <div class="form-group">
                    <label>Question text</label>
                    <textarea id="question-text" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label>Points</label>
                    <input type="number" id="question-points" value="1" min="1">
                </div>
                <div class="form-group">
                    <label>Answers (select correct)</label>
                    <div id="answer-list"></div>
                    <button type="button" id="add-answer" class="btn btn-secondary" style="margin-top: 0.5rem;">+ Add option</button>
                </div>
                <button type="submit" class="btn btn-primary">Save Question</button>
                <button type="button" id="question-modal-cancel" class="btn btn-secondary">Cancel</button>
            </form>
        </div>
    </div>

    <script src="/js/admin.js"></script>
</body>
</html>
