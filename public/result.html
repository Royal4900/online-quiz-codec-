<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Result</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <a href="/">← Home</a>
    </header>

    <main class="container">
        <div class="result-box card">

        </div>
    </main>

    <script src="/js/result.js"></script>
</body>
</html>
