<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal Portfolio - Full-Stack Developer">
  <title>Portfolio | Full-Stack Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header" id="header">
    <nav class="nav container">
      <a href="#home" class="nav__logo">Portfolio</a>
      <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav__menu" id="nav-menu">
        <li><a href="#home" class="nav__link">Home</a></li>
        <li><a href="#about" class="nav__link">About</a></li>
        <li><a href="#skills" class="nav__link">Skills</a></li>
        <li><a href="#projects" class="nav__link">Projects</a></li>
        <li><a href="#contact" class="nav__link">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero" id="home">
      <div class="hero__container container">
        <div class="hero__content">
          <p class="hero__greeting">Hi, I'm</p>
          <h1 class="hero__name" id="hero-name">Loading...</h1>
          <p class="hero__title" id="hero-title"></p>
          <p class="hero__bio" id="hero-bio"></p>
          <div class="hero__social" id="hero-social"></div>
          <a href="#contact" class="btn btn--primary">Get in Touch</a>
        </div>
      </div>
      <div class="hero__scroll">
        <a href="#about" aria-label="Scroll to about">↓</a>
      </div>
    </section>

    <section class="section" id="about">
      <div class="container">
        <h2 class="section__title">About Me</h2>
        <div class="about__content" id="about-content">
          <p class="loading">Loading profile...</p>
        </div>
      </div>
    </section>

    <section class="section section--dark" id="skills">
      <div class="container">
        <h2 class="section__title">Skills</h2>
        <div class="skills__grid" id="skills-grid">
          <p class="loading">Loading skills...</p>
        </div>
      </div>
    </section>

    <section class="section" id="projects">
      <div class="container">
        <h2 class="section__title">Projects</h2>
        <div class="projects__grid" id="projects-grid">
          <p class="loading">Loading projects...</p>
        </div>
      </div>
    </section>

    <section class="section section--dark" id="contact">
      <div class="container">
        <h2 class="section__title">Contact</h2>
        <form class="contact__form" id="contact-form">
          <div class="form__group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required minlength="2">
            <span class="form__error" data-field="name"></span>
          </div>
          <div class="form__group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <span class="form__error" data-field="email"></span>
          </div>
          <div class="form__group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject">
          </div>
          <div class="form__group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required minlength="10"></textarea>
            <span class="form__error" data-field="message"></span>
          </div>
          <p class="form__message" id="form-message"></p>
          <button type="submit" class="btn btn--primary btn--full" id="submit-btn">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; <span id="year"></span> Portfolio. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
